<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nannimoon Checkout 3.0 — UX Rethink Playground</title>
<style>
  :root {
    --brand: #fd026a;
    --brand-light: #fdf2f8;
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --text: #e5e5e5;
    --text-dim: #888;
    --text-muted: #555;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: auto 1fr auto; height: 100vh; }
  .header { grid-column: 1 / -1; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 16px; font-weight: 700; }
  .header h1 span { color: var(--brand); }
  .header-badges { display: flex; gap: 8px; }
  .badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 100px; background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
  .badge.active { background: var(--brand); color: white; border-color: var(--brand); }
  .controls { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
  .control-group { margin-bottom: 20px; }
  .control-group-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .control-row { margin-bottom: 10px; }
  .toggle-group { display: flex; gap: 4px; background: var(--bg); padding: 3px; border-radius: 8px; }
  .toggle-btn { flex: 1; padding: 6px 10px; font-size: 11px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; background: transparent; color: var(--text-dim); transition: all 0.15s; }
  .toggle-btn.active { background: var(--brand); color: white; }
  .toggle-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
  .checkbox-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; }
  .checkbox-row input[type="checkbox"] { accent-color: var(--brand); width: 14px; height: 14px; }
  .checkbox-row span { font-size: 12px; }
  .preset-btn { width: 100%; padding: 8px; font-size: 11px; font-weight: 600; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--surface2); color: var(--text); transition: all 0.15s; margin-bottom: 6px; text-align: left; }
  .preset-btn:hover { border-color: var(--brand); background: rgba(253, 2, 106, 0.08); }
  .preset-btn .preset-desc { font-weight: 400; color: var(--text-dim); font-size: 10px; display: block; margin-top: 2px; }
  .preview { overflow-y: auto; padding: 32px; background: var(--bg); }
  .preview-container { max-width: 1000px; margin: 0 auto; }
  .flow-diagram { display: flex; align-items: center; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
  .flow-step-box { padding: 10px 16px; border-radius: 10px; font-size: 12px; font-weight: 600; border: 2px solid #e5e5e5; color: #333; background: white; text-align: center; min-width: 100px; }
  .flow-step-box.active { border-color: var(--brand); background: #fdf2f8; color: #fd026a; }
  .flow-arrow { font-size: 16px; color: #666; }
  .comparison-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #aaa; margin-bottom: 8px; }

  /* ── Split payment radio options ── */
  .split-option { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; cursor:pointer; border-bottom:1px solid #e5e5e5; background:white; transition:background 0.15s; }
  .split-option:last-child { border-bottom:none; }
  .split-option.selected { background:#fdf2f8; }
  .split-option-text { flex:1; }
  .split-option-title { font-size:14px; font-weight:700; color:#111; margin-bottom:3px; }
  .split-option-desc { font-size:12px; color:#888; line-height:1.4; }
  .radio-dot { width:20px; height:20px; border-radius:50%; border:2px solid #ddd; flex-shrink:0; display:flex; align-items:center; justify-content:center; margin-left:12px; transition:all 0.15s; }
  .radio-dot.active { background:#fd026a; border-color:#fd026a; }

  /* ── Form field styling (matches Nannimoon brand) ── */
  .field { flex: 1; min-width: 0; padding: 16px 0 0; }
  .field-label {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #9ca3af;
    margin-bottom: 8px;
  }
  .field-optional {}
  .field-input {
    width: 100%;
    border: none;
    border-bottom: 2.5px solid #e5e7eb;
    outline: none;
    font-size: 16px;
    font-family: inherit;
    color: #1f2937;
    background: transparent;
    padding: 8px 0 12px;
    transition: border-color 0.25s ease;
    letter-spacing: 0.01em;
  }
  .field-input::placeholder { color: #d1d5db; font-weight: 400; }
  .field-input:focus { border-bottom-color: #fd026a; }
  .field-micro {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 6px;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Nannimoon <span>Checkout 3.0</span> — UX Playground</h1>
    <div class="header-badges">
      <span class="badge" id="badge-phase">v3.0</span>
      <span class="badge active" id="badge-view">Mobile</span>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <div class="control-group-title">Quick Start</div>
      <button class="preset-btn" onclick="applyPreset('current')">Current (v2.0)<span class="preset-desc">Payment Choice > Card > Review</span></button>
      <button class="preset-btn" onclick="applyPreset('recommended')">Recommended (v3.0)<span class="preset-desc">Details > Payment & Confirm, pills, timeline</span></button>
      <button class="preset-btn" onclick="applyPreset('premium')">Premium Max<span class="preset-desc">+ PaymentElement, all features</span></button>
    </div>
    <div class="control-group">
      <div class="control-group-title">Device</div>
      <div class="toggle-group">
        <button class="toggle-btn" onclick="setView('desktop')" id="view-desktop">Desktop</button>
        <button class="toggle-btn active" onclick="setView('mobile')" id="view-mobile">Mobile</button>
      </div>
    </div>
    <div class="control-group">
      <div class="control-group-title">Checkout Flow</div>
      <div class="toggle-group">
        <button class="toggle-btn" onclick="setFlow('current')" id="flow-current">Current</button>
        <button class="toggle-btn active" onclick="setFlow('new')" id="flow-new">New (Recommended)</button>
      </div>
    </div>
    <div class="control-group">
      <div class="control-group-title">Show Step</div>
      <div class="toggle-group" id="step-toggles">
        <button class="toggle-btn active" onclick="setStep(1)" id="step-1">1</button>
        <button class="toggle-btn" onclick="setStep(2)" id="step-2">2</button>
      </div>
    </div>
    <div class="control-group">
      <div class="control-group-title">Trip Summary Style</div>
      <div class="toggle-group">
        <button class="toggle-btn" onclick="setSidebar('receipt')" id="sidebar-receipt">Receipt</button>
        <button class="toggle-btn active" onclick="setSidebar('itinerary')" id="sidebar-itinerary">Itinerary</button>
      </div>
    </div>
    <div class="control-group">
      <div class="control-group-title">Payment Form</div>
      <div class="toggle-group">
        <button class="toggle-btn" onclick="setStripe('card')" id="stripe-card">Card Only</button>
        <button class="toggle-btn active" onclick="setStripe('payment')" id="stripe-payment">Card + Apple/Google Pay</button>
      </div>
    </div>
    <div class="control-group">
      <div class="control-group-title">Button Shape</div>
      <div class="toggle-group">
        <button class="toggle-btn" onclick="setCta('rounded')" id="cta-rounded">Rounded</button>
        <button class="toggle-btn active" onclick="setCta('pill')" id="cta-pill">Pill</button>
      </div>
    </div>
    <div class="control-group">
      <div class="control-group-title">Show / Hide</div>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('splitPayment', this.checked)" id="feat-split"><span>Pay in 2 installments option</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('urgencyBadge', this.checked)" id="feat-urgency"><span>"Rare find" notice</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('trustBadges', this.checked)" id="feat-trust"><span>Trust icons (Stripe, support, etc.)</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('microcopy', this.checked)" id="feat-micro"><span>Helper text under fields</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('cancelPill', this.checked)" id="feat-cancel"><span>Free cancellation countdown</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('collapsibleRules', this.checked)" id="feat-rules"><span>Expandable nanny rules</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('actionCta', this.checked)" id="feat-action-cta"><span>Descriptive button labels</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('guestFav', this.checked)" id="feat-guest-fav"><span>"Guest favorite" badge</span></label>
    </div>
    <div class="control-group">
      <div class="control-group-title" style="color:#fd026a">Psychology Phase 1</div>
      <button class="preset-btn" style="border-color:#fd026a;background:rgba(253,2,106,0.06)" onclick="applyPsychAll(true)">Enable All Phase 1<span class="preset-desc">All 12 micro-copy enhancements</span></button>
      <button class="preset-btn" onclick="applyPsychAll(false)">Disable All Phase 1<span class="preset-desc">Revert to current copy</span></button>
      <div style="height:6px"></div>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psyTitle', this.checked)" id="feat-psyTitle"><span>"Complete your booking" title</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psySubtitle', this.checked)" id="feat-psySubtitle"><span>"Takes about 2 minutes" hint</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psyWhatsapp', this.checked)" id="feat-psyWhatsapp"><span>Warmer WhatsApp &amp; email hints</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psyPlaceholders', this.checked)" id="feat-psyPlaceholders"><span>Real-world example placeholders</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psyStripeTrust', this.checked)" id="feat-psyStripeTrust"><span>"Encrypted by Stripe" note</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psySplitCopy', this.checked)" id="feat-psySplitCopy"><span>"No interest" on split pay</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psyCta', this.checked)" id="feat-psyCta"><span>"Secure Your Booking" button</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psyTerms', this.checked)" id="feat-psyTerms"><span>Friendlier terms wording</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psySidebarOwnership', this.checked)" id="feat-psySidebarOwnership"><span>"Your nanny" &amp; "Your Trip" labels</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psyNannyReview', this.checked)" id="feat-psyNannyReview"><span>Guest review quote</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psyCancelCopy', this.checked)" id="feat-psyCancelCopy"><span>"Change of plans?" cancel text</span></label>
      <label class="checkbox-row"><input type="checkbox" checked onchange="toggleFeature('psyProcessing', this.checked)" id="feat-psyProcessing"><span>"Securing your booking..." loading</span></label>
    </div>
  </div>

  <div class="preview" id="preview"></div>
</div>

<script>
const DEFAULTS = { view:'mobile', flow:'new', step:1, sidebar:'itinerary', stripe:'payment', cta:'pill', splitPayment:true, urgencyBadge:true, trustBadges:true, microcopy:true, cancelPill:true, collapsibleRules:true, actionCta:true, guestFav:true, psyTitle:true, psySubtitle:true, psyWhatsapp:true, psyStripeTrust:true, psyCta:true, psyTerms:true, psySidebarOwnership:true, psyNannyReview:true, psyPlaceholders:true, psyCancelCopy:true, psySplitCopy:true, psyProcessing:true };
const state = { ...DEFAULTS };

function updateAll() { renderPreview(); updateBadges(); }

function updateBadges() {
  document.getElementById('badge-phase').textContent = state.flow === 'current' ? 'Current v2' : 'v3.0';
  document.getElementById('badge-view').textContent = state.view === 'desktop' ? 'Desktop' : 'Mobile';
}

function setView(v) { state.view = v; document.getElementById('view-desktop').className = 'toggle-btn' + (v==='desktop'?' active':''); document.getElementById('view-mobile').className = 'toggle-btn' + (v==='mobile'?' active':''); updateAll(); }
function setFlow(f) { state.flow = f; document.getElementById('flow-current').className = 'toggle-btn' + (f==='current'?' active':''); document.getElementById('flow-new').className = 'toggle-btn' + (f==='new'?' active':''); updateAll(); }
function setStep(s) { if (state.flow==='new' && s > 2) s = 2; state.step = s; [1,2,3].forEach(i => { const el = document.getElementById('step-'+i); if (el) el.className = 'toggle-btn' + (i===s?' active':''); }); updateAll(); }
function setSidebar(s) { state.sidebar = s; document.getElementById('sidebar-receipt').className = 'toggle-btn' + (s==='receipt'?' active':''); document.getElementById('sidebar-itinerary').className = 'toggle-btn' + (s==='itinerary'?' active':''); updateAll(); }
function setStripe(s) { state.stripe = s; document.getElementById('stripe-card').className = 'toggle-btn' + (s==='card'?' active':''); document.getElementById('stripe-payment').className = 'toggle-btn' + (s==='payment'?' active':''); updateAll(); }
function setCta(c) { state.cta = c; document.getElementById('cta-rounded').className = 'toggle-btn' + (c==='rounded'?' active':''); document.getElementById('cta-pill').className = 'toggle-btn' + (c==='pill'?' active':''); updateAll(); }
function toggleFeature(f, v) { state[f] = v; updateAll(); }
function applyPsychAll(on) { ['psyTitle','psySubtitle','psyWhatsapp','psyStripeTrust','psyCta','psyTerms','psySidebarOwnership','psyNannyReview','psyPlaceholders','psyCancelCopy','psySplitCopy','psyProcessing'].forEach(k => { state[k] = on; }); syncControls(); updateAll(); }

function applyPreset(name) {
  if (name==='current') Object.assign(state, { flow:'current', sidebar:'receipt', stripe:'card', cta:'rounded', splitPayment:true, urgencyBadge:false, trustBadges:false, microcopy:false, cancelPill:false, collapsibleRules:false, actionCta:false, guestFav:false, step:1 });
  else if (name==='recommended') Object.assign(state, { flow:'new', sidebar:'itinerary', stripe:'card', cta:'pill', splitPayment:true, urgencyBadge:true, trustBadges:true, microcopy:true, cancelPill:true, collapsibleRules:true, actionCta:true, guestFav:true, step:1 });
  else if (name==='premium') Object.assign(state, { flow:'new', sidebar:'itinerary', stripe:'payment', cta:'pill', splitPayment:true, urgencyBadge:true, trustBadges:true, microcopy:true, cancelPill:true, collapsibleRules:true, actionCta:true, guestFav:true, step:1 });
  syncControls(); updateAll();
}

function syncControls() {
  document.getElementById('flow-current').className = 'toggle-btn' + (state.flow==='current'?' active':'');
  document.getElementById('flow-new').className = 'toggle-btn' + (state.flow==='new'?' active':'');
  document.getElementById('sidebar-receipt').className = 'toggle-btn' + (state.sidebar==='receipt'?' active':'');
  document.getElementById('sidebar-itinerary').className = 'toggle-btn' + (state.sidebar==='itinerary'?' active':'');
  document.getElementById('stripe-card').className = 'toggle-btn' + (state.stripe==='card'?' active':'');
  document.getElementById('stripe-payment').className = 'toggle-btn' + (state.stripe==='payment'?' active':'');
  document.getElementById('cta-rounded').className = 'toggle-btn' + (state.cta==='rounded'?' active':'');
  document.getElementById('cta-pill').className = 'toggle-btn' + (state.cta==='pill'?' active':'');
  [1,2,3].forEach(i => { const el = document.getElementById('step-'+i); if (el) el.className = 'toggle-btn' + (i===state.step?' active':''); });
  document.getElementById('feat-split').checked = state.splitPayment;
  document.getElementById('feat-urgency').checked = state.urgencyBadge;
  document.getElementById('feat-trust').checked = state.trustBadges;
  document.getElementById('feat-micro').checked = state.microcopy;
  document.getElementById('feat-cancel').checked = state.cancelPill;
  document.getElementById('feat-rules').checked = state.collapsibleRules;
  document.getElementById('feat-action-cta').checked = state.actionCta;
  document.getElementById('feat-guest-fav').checked = state.guestFav;
  ['psyTitle','psySubtitle','psyWhatsapp','psyStripeTrust','psyCta','psyTerms','psySidebarOwnership','psyNannyReview','psyPlaceholders','psyCancelCopy','psySplitCopy','psyProcessing'].forEach(k => { const el = document.getElementById('feat-'+k); if (el) el.checked = state[k]; });
}

function getSteps() {
  if (state.flow==='current') return state.splitPayment ? ['Choose when to pay','Add a payment method','Review your request'] : ['Add a payment method','Review your request'];
  return ['Your Details','Payment & Confirm'];
}

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => { if (k==='style'&&typeof v==='object') Object.assign(e.style, v); else if (k==='className') e.className=v; else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v); else e.setAttribute(k, v); });
  if (children) { if (typeof children==='string') e.textContent=children; else if (Array.isArray(children)) children.forEach(c => { if (c) e.appendChild(typeof c==='string' ? document.createTextNode(c) : c); }); else e.appendChild(children); }
  return e;
}

function elHTML(tag, attrs, html) {
  const e = el(tag, attrs);
  // This playground is self-contained with only trusted static content
  e.innerHTML = html;
  return e;
}

function buildField(label, placeholder, value, micro, optional) {
  const d = el('div', {className:'field'});
  const lbl = el('div', {className:'field-label' + (optional&&state.microcopy?' field-optional':'')});
  lbl.textContent = label;
  if (optional && state.microcopy) {
    const optSpan = el('span', {style:{color:'#ccc',fontWeight:'400'}}, ' (optional)');
    lbl.appendChild(optSpan);
  }
  d.appendChild(lbl);
  const inp = el('input', {className:'field-input', placeholder: placeholder||'', readonly: value?'readonly':undefined});
  if (value) inp.value = value;
  d.appendChild(inp);
  if (micro && state.microcopy) d.appendChild(el('div', {className:'field-micro'}, micro));
  return d;
}

function buildRadio(title, desc, selected) {
  const opt = el('div', {className:'split-option' + (selected?' selected':'')});
  const txt = el('div', {className:'split-option-text'}, [el('div', {className:'split-option-title'}, title), el('div', {className:'split-option-desc'}, desc)]);
  const dot = el('div', {className:'radio-dot' + (selected?' active':'')});
  if (selected) dot.appendChild(el('div', {style:{width:'6px',height:'6px',background:'white',borderRadius:'50%'}}));
  opt.append(txt, dot);
  return opt;
}

function buildTrustBadges() {
  if (!state.trustBadges) return null;
  const wrap = el('div', {style:{display:'flex',flexDirection:'column',gap:'10px',marginTop:'16px'}});
  [['#dcfce7','#22c55e','Secure payment by Stripe'],['#fce7f3','#fd026a','Free nanny replacement'],['#dbeafe','#3b82f6','24/7 WhatsApp support']].forEach(([bg,color,text]) => {
    const row = el('div', {style:{display:'flex',alignItems:'center',gap:'10px',fontSize:'12px',color:'#666'}});
    const icon = el('div', {style:{width:'20px',height:'20px',borderRadius:'50%',background:bg,color:color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',flexShrink:'0'}}, '\u2713');
    row.append(icon, el('span', null, text));
    wrap.appendChild(row);
  });
  return wrap;
}

function buildCardElement() {
  const mock = el('div', {style:{border:'1px solid #e5e5e5',borderRadius: state.cta==='pill'?'16px':'12px',overflow:'hidden'}});
  if (state.stripe === 'payment') {
    const express = el('div', {style:{display:'flex',gap:'8px',padding:'16px',borderBottom:'1px solid #f0f0f0'}});
    const appleBtn = el('div', {style:{flex:'1',padding:'10px',border:'1px solid #e5e5e5',borderRadius:'8px',background:'#000',color:'white',fontSize:'12px',fontWeight:'600',textAlign:'center'}}, '\uF8FF Pay');
    const gBtn = el('div', {style:{flex:'1',padding:'10px',border:'1px solid #e5e5e5',borderRadius:'8px',background:'white',color:'#333',fontSize:'12px',fontWeight:'600',textAlign:'center'}}, 'G Pay');
    express.append(appleBtn, gBtn);
    mock.appendChild(express);
    mock.appendChild(el('div', {style:{padding:'12px 16px',textAlign:'center',fontSize:'11px',color:'#aaa',borderBottom:'1px solid #f0f0f0'}}, 'Or pay with card'));
  } else {
    const hdr = el('div', {style:{padding:'12px 16px',background:'#fafafa',borderBottom:'1px solid #f0f0f0',display:'flex',alignItems:'center',gap:'8px',fontSize:'13px',fontWeight:'700',color:'#333'}});
    hdr.appendChild(el('div', {style:{width:'20px',height:'14px',background:'linear-gradient(135deg,#667eea,#764ba2)',borderRadius:'3px'}}));
    hdr.appendChild(el('span', null, 'Credit or debit card'));
    mock.appendChild(hdr);
  }
  const fields = el('div', {style:{padding:'20px'}});
  const cardNum = buildField('Card Number', '4242 4242 4242 4242');
  cardNum.style.marginBottom = '12px';
  fields.appendChild(cardNum);
  const row = el('div', {style:{display:'flex',gap:'16px'}});
  row.append(buildField('Expiration', 'MM / YY'), buildField(state.stripe==='payment'?'CVC':'CVV', state.stripe==='payment'?'CVC':'123'));
  fields.appendChild(row);
  mock.appendChild(fields);
  if (state.psyStripeTrust) {
    const trustLine = el('div', {style:{padding:'10px 20px 14px',fontSize:'11px',color:'#999',borderTop:'1px solid #f0f0f0',display:'flex',alignItems:'center',gap:'6px'}});
    trustLine.appendChild(el('span', {style:{fontSize:'13px'}}, '\uD83D\uDD12'));
    trustLine.appendChild(document.createTextNode('Your card details are encrypted by Stripe. We never store your card number.'));
    mock.appendChild(trustLine);
  }
  return mock;
}

function buildSidebar() {
  const card = el('div', {style:{background:'white',border:'1px solid #e5e5e5',borderRadius:'16px',padding:'20px'}});

  // Nanny card
  const nanny = el('div', {style:{display:'flex',gap:'12px',marginBottom:'16px'}});
  const avatarSize = state.sidebar==='itinerary' ? '80px' : '64px';
  const avatar = el('div', {style:{width:avatarSize,height:avatarSize,borderRadius:'12px',background:'linear-gradient(135deg,#fce4ec,#f8bbd0)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px',fontWeight:'700',color:'#fd026a',flexShrink:'0'}}, 'L');
  const info = el('div');
  if (state.psySidebarOwnership) {

function renderDesktop() {
  const preview = document.getElementById('preview');
  preview.replaceChildren();
  const container = el('div', {style:{maxWidth:'1000px',margin:'0 auto'}});

  // Label
  container.appendChild(el('div', {className:'comparison-label'}, state.flow==='new'?'New Flow (v3.0)':'Current Flow (v2.0)'));

  // Flow diagram
  const steps = getSteps();
  const flow = el('div', {className:'flow-diagram'});
  steps.forEach((s,i) => {
    flow.appendChild(el('div', {className:'flow-step-box' + ((i+1)===state.step?' active':'')}, s));
    if (i < steps.length-1) flow.appendChild(el('div', {className:'flow-arrow'}, '\u2192'));
  });
  container.appendChild(flow);

  // Checkout mock
  const mock = el('div', {style:{background:'white',borderRadius:'16px',overflow:'hidden',boxShadow:'0 8px 32px rgba(0,0,0,0.4)'}});
  const desktop = el('div', {style:{display:'flex',minHeight:'700px'}});

  // Steps column
  const stepsCol = el('div', {style:{flex:'1',padding:'32px',minWidth:'0'}});
  const titleText = state.flow==='new' ? (state.psyTitle ? 'Complete your booking' : 'Request to book') : 'Request to book';
  stepsCol.appendChild(el('div', {style:{fontSize:'22px',fontWeight:'700',color:'#111',marginBottom: state.psySubtitle&&state.flow==='new'?'4px':'24px'}}, titleText));
  if (state.psySubtitle && state.flow==='new') stepsCol.appendChild(el('div', {style:{fontSize:'13px',color:'#999',marginBottom:'24px'}}, 'Just 3 steps \u2014 takes about 2 minutes'));

  steps.forEach((step, i) => {
    const isActive = (i+1) === state.step;
    const isDone = (i+1) < state.step;
    const isLocked = !isActive && !isDone;
    const item = el('div', {style:{padding:'20px 0',borderBottom:'1px solid #f0f0f0',opacity:isLocked?'0.35':'1',transition:'opacity 0.3s'}});
    const hdr = el('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});

    stepsCol.appendChild(item);
  });
  desktop.appendChild(stepsCol);

  // Sidebar
  const sidebarWrap = el('div', {style:{width:'360px',flexShrink:'0',padding:'32px',borderLeft:'1px solid #f0f0f0',background:'#fafafa'}});
  sidebarWrap.appendChild(buildSidebar());

  mock.appendChild(desktop);
  container.appendChild(mock);
  preview.appendChild(container);
}

  else { nav.appendChild(el('button', {style:{width:'32px',height:'32px',borderRadius:'50%',border:'none',background:'transparent',fontSize:'18px',cursor:'pointer',color:'#333'},onClick:()=>{if(state.step>1)setStep(state.step-1)}}, '\u2190')); }

  nav.appendChild(el('button', {style:{width:'32px',height:'32px',borderRadius:'50%',border:'none',background:'transparent',fontSize:'18px',cursor:'pointer',color:'#333'}}, '\u2715'));
  header.appendChild(nav);
  const progress = el('div', {style:{display:'flex',gap:'4px',height:'4px'}});
  const numSegments = state.flow==='new' ? 2 : 3;
  for (let s = 1; s <= numSegments; s++) progress.appendChild(el('div', {style:{flex:'1',borderRadius:'100px',background:s<=page?'#fd026a':'#e5e5e5',transition:'background 0.3s'}}));
  header.appendChild(progress);
  mock.appendChild(header);

  // Content
  const content = el('div', {style:{flex:'1',padding:'20px',overflow:'auto',paddingBottom:'100px'}});

  if (state.flow === 'new') {
    if (page === 1) {
      // Your Details form first
      const mobileTitle = state.psyTitle ? 'Complete your booking' : 'Your details';
      const titleEl = el('div', {style:{fontSize:'20px',fontWeight:'700',color:'#111',marginBottom: state.psySubtitle?'4px':'20px'}}, mobileTitle);
      content.appendChild(titleEl);
      if (state.psySubtitle) content.appendChild(el('div', {style:{fontSize:'12px',color:'#999',marginBottom:'20px'}}, 'Just 2 steps \u2014 takes about 2 minutes'));
      const row1 = el('div', {style:{display:'flex',gap:'16px',marginBottom:'16px'}});
      row1.append(buildField('First Name','','Adam'), buildField('Last Name','Required','Oliver'));
      content.appendChild(row1);
      content.appendChild(buildField('Email','','adam@email.com', state.psyWhatsapp?"We'll send your booking confirmation here":null));
      content.lastChild.style.marginBottom = '16px';
      content.appendChild(buildField('WhatsApp Phone','+1 (555) 000-0000','+1 555 000-0000', state.psyWhatsapp?"We'll send your nanny's intro and trip updates here":'For WhatsApp booking updates'));
      content.lastChild.style.marginBottom = '16px';
      content.appendChild(buildField(state.psyPlaceholders?'How many children?':'Number of Children','','2'));
      content.lastChild.style.marginBottom = '16px';
      content.appendChild(buildField('Phuket Hotel / Villa', state.psyPlaceholders?'e.g., Banyan Tree Phuket':'Where are you staying?','',null,true));
      content.lastChild.style.marginBottom = '16px';
      content.appendChild(buildField('Special Requests', state.psyPlaceholders?"e.g., 'My toddler naps at 1pm'":'Allergies, special needs...','',null,true));

      // Review your booking below
      content.appendChild(el('div', {style:{fontSize:'20px',fontWeight:'700',color:'#111',marginBottom:'20px',marginTop:'32px'}}, 'Review your booking'));
      // Nanny card
      const nanny = el('div', {style:{display:'flex',gap:'12px',marginBottom:'16px'}});
      nanny.appendChild(el('div', {style:{width:'64px',height:'64px',borderRadius:'12px',background:'linear-gradient(135deg,#fce4ec,#f8bbd0)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px',fontWeight:'700',color:'#fd026a',flexShrink:'0'}}, 'L'));
      const info = el('div');
      if (state.psySidebarOwnership) {
        info.appendChild(el('div', {style:{fontSize:'16px',fontWeight:'700',color:'#333'}}, 'Your nanny: Laila'));
        info.appendChild(el('div', {style:{fontSize:'11px',color:'#999',marginTop:'2px'}}, 'Professional childcare for your family'));
      } else {
        info.appendChild(el('div', {style:{fontSize:'16px',fontWeight:'700',color:'#333'}}, 'Professional Care with Laila'));
      }
      const rat = el('div', {style:{fontSize:'11px',color:'#888'}});
      rat.appendChild(el('span', {style:{color:'#fd026a'}}, '\u2605 '));
      rat.appendChild(document.createTextNode('4.9 \u00B7 Guest favorite'));
      info.appendChild(rat);
      nanny.appendChild(info);
      content.appendChild(nanny);
      if (state.psyNannyReview) {
        const mobReview = el('div', {style:{background:'#fafafa',borderRadius:'10px',padding:'10px 12px',marginBottom:'16px',borderLeft:'3px solid #fd026a'}});
        mobReview.appendChild(el('div', {style:{fontSize:'11px',color:'#555',fontStyle:'italic',lineHeight:'1.5'}}, '"Laila was incredible with our 2-year-old. She felt like family."'));
        mobReview.appendChild(el('div', {style:{fontSize:'10px',color:'#999',marginTop:'4px',fontWeight:'600'}}, '\u2014 Sarah T., London'));
        content.appendChild(mobReview);
      }
      if (state.urgencyBadge) {
        const urg = el('div', {style:{background:'#fdf2f8',border:'1px solid #fce4ec',borderRadius:'12px',padding:'12px',display:'flex',alignItems:'center',gap:'10px',marginBottom:'16px'}});
        urg.appendChild(el('div', {style:{width:'28px',height:'28px',borderRadius:'50%',background:'#fd026a',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',flexShrink:'0'}}, '\u2605'));
        urg.appendChild(el('div', {style:{fontSize:'11px',color:'#555',fontWeight:'500'}}, 'Rare find! Laila is usually booked for these dates.'));
        content.appendChild(urg);
      }
      // Trip summary
      const trip = el('div', {style:{background:'#fafafa',borderRadius:'12px',padding:'16px',border:'1px solid #e5e5e5',marginBottom:'16px'}});
      trip.appendChild(el('div', {style:{fontSize:'10px',fontWeight:'800',textTransform:'uppercase',letterSpacing:'0.1em',color:'#bbb',marginBottom:'10px'}}, 'Your Trip'));
      const tl = el('div', {style:{position:'relative',paddingLeft:'20px'}});
      tl.appendChild(el('div', {style:{position:'absolute',left:'5px',top:'8px',bottom:'8px',width:'2px',background:'#e5e5e5'}}));
      [['Phuket','Feb 25 \u2013 Feb 27'],['Krabi','Feb 27 \u2013 Feb 28']].forEach(([d,dt],i) => {
        const item = el('div', {style:{position:'relative',paddingBottom:i===0?'14px':'0'}});
        item.appendChild(el('div', {style:{position:'absolute',left:'-20px',top:'4px',width:'12px',height:'12px',borderRadius:'50%',background:'white',border:'3px solid #fd026a'}}));
        item.appendChild(el('div', {style:{fontSize:'13px',fontWeight:'600',color:'#333'}}, d));
        item.appendChild(el('div', {style:{fontSize:'11px',color:'#999',marginTop:'2px'}}, dt));
        tl.appendChild(item);
      });
      trip.appendChild(tl);
      const priceDiv = el('div', {style:{borderTop:'1px solid #e5e5e5',marginTop:'12px',paddingTop:'12px'}});
      [['$89 \u00d7 4 days','$356.00'],['Accommodation','$110.00'],['Service fee','$79.22']].forEach(([l,v]) => {
        const row = el('div', {style:{display:'flex',justifyContent:'space-between',fontSize:'13px',color:'#666',padding:'4px 0'}});
        row.append(el('span', null, l), el('span', null, v));
        priceDiv.appendChild(row);
      });
      trip.appendChild(priceDiv);
      content.appendChild(trip);
    } else {
      content.appendChild(el('div', {style:{fontSize:'20px',fontWeight:'700',color:'#111',marginBottom:'20px'}}, 'Pay & confirm'));
      if (state.splitPayment) {
        const mobSplitDesc = state.psySplitCopy ? '$272.61 charged on Feb 18, 2026. No extra fees, no interest. Automatic charge.' : '$272.61 charged on Feb 18, 2026. No extra fees.';
        const mobSplit = el('div', {style:{border:'1px solid #e5e5e5',borderRadius:'16px',overflow:'hidden',marginBottom:'20px'}});
        mobSplit.append(buildRadio('Pay $272.61 now', mobSplitDesc, true), buildRadio('Pay $545.22 now', "Pay the total and you're all set.", false));
        content.appendChild(mobSplit);
      }
      content.appendChild(buildCardElement());
      content.lastChild.style.marginBottom = '16px';
      const trust = buildTrustBadges();
      if (trust) { trust.style.marginBottom = '16px'; content.appendChild(trust); }
      // Booking summary
      const summary = el('div', {style:{background:'#fafafa',borderRadius:'12px',padding:'16px',marginBottom:'16px'}});
      summary.appendChild(el('div', {style:{fontSize:'14px',fontWeight:'700',color:'#333',marginBottom:'10px'}}, 'Booking summary'));
      // Reservation details
      [['Nanny','Laila'],['Phuket','Feb 25 \u2013 Feb 27'],['Krabi','Feb 27 \u2013 Feb 28'],['Duration','4 days']].forEach(([l,v]) => {
        const row = el('div', {style:{display:'flex',justifyContent:'space-between',fontSize:'12px',padding:'4px 0'}});
        row.append(el('span', {style:{color:'#888'}}, l), el('span', {style:{color:'#333',fontWeight:'500'}}, v));
        summary.appendChild(row);
      });
      // Price breakdown
      const priceSep = el('div', {style:{borderTop:'1px solid #e5e5e5',margin:'6px 0'}});
      summary.appendChild(priceSep);
      [['$89 \u00d7 4 days','$356.00'],['Accommodation','$110.00'],['Service fee','$79.22']].forEach(([l,v]) => {
        const row = el('div', {style:{display:'flex',justifyContent:'space-between',fontSize:'12px',padding:'4px 0'}});
        row.append(el('span', {style:{color:'#888'}}, l), el('span', {style:{color:'#333',fontWeight:'500'}}, v));
        summary.appendChild(row);
      });
      const totalRow = el('div', {style:{display:'flex',justifyContent:'space-between',fontSize:'12px',padding:'4px 0',fontWeight:'700',color:'#111'}});
      totalRow.append(el('span', null, 'Total'), el('span', null, '$545.22'));
      summary.appendChild(totalRow);
      // Guest details
      const guestSep = el('div', {style:{borderTop:'1px solid #e5e5e5',margin:'6px 0'}});
      summary.appendChild(guestSep);
      [['Name','Adam Oliver'],['Email','adam@email.com'],['Phone','+1 555 000-0000'],['Children','2'],['Phuket accommodation','Hotel Paradise']].forEach(([l,v]) => {
        const row = el('div', {style:{display:'flex',justifyContent:'space-between',fontSize:'12px',padding:'4px 0'}});
        row.append(el('span', {style:{color:'#888'}}, l), el('span', {style:{color:'#333',fontWeight:'500'}}, v));
        summary.appendChild(row);
      });
      summary.appendChild(el('div', {style:{fontSize:'11px',fontWeight:'700',color:'#111',textDecoration:'underline',cursor:'pointer',marginTop:'8px'},onClick:()=>setStep(1)}, 'Edit details'));
      content.appendChild(summary);
      // Cancel tiers
      const tiers = el('div', {style:{marginBottom:'16px'}});
      [['#22c55e','Free cancel (net 5%)'],['#f59e0b','80% refund'],['#ef4444','No refund']].forEach(([c,t]) => {
        const tier = el('div', {style:{display:'flex',alignItems:'flex-start',gap:'8px',padding:'4px 0',fontSize:'12px',color:'#666'}});
        tier.appendChild(el('div', {style:{width:'8px',height:'8px',borderRadius:'50%',background:c,marginTop:'4px',flexShrink:'0'}}));
        tier.appendChild(el('span', null, t));
        tiers.appendChild(tier);
      });
      content.appendChild(tiers);
      // Terms
      const terms = el('div', {style:{display:'flex',alignItems:'flex-start',gap:'10px'}});
      const chk = el('input', {type:'checkbox',style:{width:'18px',height:'18px',accentColor:'#fd026a',marginTop:'2px',flexShrink:'0'}});
      chk.checked = true;
      const txt = el('div', {style:{fontSize:'11px',color:'#888',lineHeight:'1.5'}});
      if (state.psyTerms) {
        txt.appendChild(document.createTextNode('Your payment is secure. I agree to the '));
        txt.appendChild(el('span', {style:{color:'#111',fontWeight:'700',textDecoration:'underline'}}, 'Cancellation Policy'));
        txt.appendChild(document.createTextNode(' and '));
        txt.appendChild(el('span', {style:{color:'#111',fontWeight:'700',textDecoration:'underline'}}, 'Terms'));
        txt.appendChild(document.createTextNode('.'));
      } else {
        txt.appendChild(document.createTextNode('I agree to the '));
        txt.appendChild(el('span', {style:{color:'#111',fontWeight:'700',textDecoration:'underline'}}, 'Cancellation Policy'));
        txt.appendChild(document.createTextNode(' and '));
        txt.appendChild(el('span', {style:{color:'#111',fontWeight:'700',textDecoration:'underline'}}, 'Terms'));
        txt.appendChild(document.createTextNode('.'));
      }
      terms.append(chk, txt);
      content.appendChild(terms);
    }
  } else {
    content.appendChild(el('div', {style:{fontSize:'20px',fontWeight:'700',color:'#111',marginBottom:'20px'}}, pages[page-1]));
    content.appendChild(el('div', {style:{color:'#888',fontSize:'13px'}}, 'Current v2 layout \u2014 switch to v3 to see the redesign'));
  }

  mock.appendChild(content);

  // Sticky bar
  const bar = el('div', {style:{position:'absolute',bottom:'0',left:'0',right:'0',background:'white',borderTop:'1px solid #f0f0f0',padding:'14px 20px',display:'flex',alignItems:'center',gap:'16px',boxShadow:'0 -4px 12px rgba(0,0,0,0.05)'}});
  const showPrice = !(state.flow==='new' && page===1);
  if (showPrice) {
    const priceWrap = el('div', {style:{minWidth:'80px'}});
    priceWrap.appendChild(el('div', {style:{fontSize:'16px',fontWeight:'800',color:'#111'}}, state.splitPayment?'$272.61':'$545.22'));
    priceWrap.appendChild(el('div', {style:{fontSize:'9px',fontWeight:'700',textTransform:'uppercase',color:'#aaa',letterSpacing:'0.03em'}}, state.splitPayment?'Due today':'Total'));
    bar.appendChild(priceWrap);
  }
  const maxSteps = state.flow==='new' ? 2 : 3;
  const ctaLabels = state.flow==='new' ? ['Continue to payment', state.psyCta?'Secure Your Booking':'Confirm and pay'] : ['Next','Continue','Confirm & Reserve'];
  const cta = el('button', {style:{flex:'1',padding:'14px',border:'none',borderRadius:state.cta==='pill'?'100px':'12px',fontSize:'14px',fontWeight:'700',color:'white',background:'#fd026a',cursor:'pointer',textAlign:'center'},onClick:()=>{if(state.step<maxSteps)setStep(state.step+1)}}, ctaLabels[page-1]);
  bar.appendChild(cta);
  mock.appendChild(bar);

  container.appendChild(mock);
  preview.appendChild(container);
}

function renderPreview() {
  if (state.view === 'desktop') renderDesktop();
  else renderMobile();
}

updateAll();
</script>
</body>
</html>
